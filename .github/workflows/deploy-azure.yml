name: Deploy → Azure

# Dispara no push para main (após CI passar) ou manualmente
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente alvo'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

# OIDC — sem secrets de longa duração para auth no Azure
permissions:
  id-token: write
  contents: read

# Evita deploys paralelos para o mesmo ambiente
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}    # ex: noc-ai-chat-prod
  APP_NAME:             ${{ vars.APP_NAME }}                 # ex: nocaichat
  DEPLOY_ENV:           ${{ inputs.environment || 'prod' }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Infraestrutura (Bicep)
# Cria/atualiza ACR, Redis, Container Apps Environment e apps.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  infra:
    name: 🏗 Infraestrutura (Bicep)
    runs-on: ubuntu-latest
    outputs:
      backend-fqdn:       ${{ steps.bicep.outputs.backendFqdn }}
      acr-login-server:   ${{ steps.bicep.outputs.acrLoginServer }}
      acr-name:           ${{ steps.bicep.outputs.acrName }}
      swa-name:           ${{ steps.bicep.outputs.staticWebAppName }}
      frontend-hostname:  ${{ steps.bicep.outputs.frontendHostname }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template:          ./infra/main.bicep
          parameters: >
            ./infra/prod.bicepparam
            appName="${{ env.APP_NAME }}"
            env="${{ env.DEPLOY_ENV }}"
            imageTag="${{ github.sha }}"
            frontendUrl="${{ vars.FRONTEND_URL }}"
            anthropicApiKey="${{ secrets.ANTHROPIC_API_KEY }}"
            jwtSecret="${{ secrets.JWT_SECRET }}"
            openaiApiKey="${{ secrets.OPENAI_API_KEY }}"
            elevenLabsApiKey="${{ secrets.ELEVENLABS_API_KEY }}"
            elevenLabsVoiceId="${{ secrets.ELEVENLABS_VOICE_ID }}"
            zabbixUrl="${{ secrets.ZABBIX_URL }}"
            zabbixUser="${{ secrets.ZABBIX_USER }}"
            zabbixPassword="${{ secrets.ZABBIX_PASSWORD }}"
            datadogApiKey="${{ secrets.DATADOG_API_KEY }}"
            datadogAppKey="${{ secrets.DATADOG_APP_KEY }}"
            grafanaUrl="${{ secrets.GRAFANA_URL }}"
            grafanaToken="${{ secrets.GRAFANA_TOKEN }}"
            thousandEyesToken="${{ secrets.THOUSANDEYES_TOKEN }}"
          failOnStdErr: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build e push das imagens Docker
# Roda em paralelo após infra estar pronta.
# ─────────────────────────────────────────────────────────────────────────────
  build-images:
    name: 🐳 Build & Push imagens
    runs-on: ubuntu-latest
    needs: infra

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: mcp-zabbix
            context: ./mcp-servers/zabbix
          - name: mcp-datadog
            context: ./mcp-servers/datadog
          - name: mcp-grafana
            context: ./mcp-servers/grafana
          - name: mcp-thousandeyes
            context: ./mcp-servers/thousandeyes

    steps:
      - uses: actions/checkout@v4

      - name: Login Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login ACR
        run: az acr login --name ${{ needs.infra.outputs.acr-name }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ needs.infra.outputs.acr-login-server }}/${{ matrix.name }}:${{ github.sha }}
            ${{ needs.infra.outputs.acr-login-server }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,scope=${{ matrix.name }},mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Deploy dos Container Apps (backend + MCP servers)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-apps:
    name: 🚀 Deploy Container Apps
    runs-on: ubuntu-latest
    needs: [infra, build-images]

    steps:
      - name: Login Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Atualizar imagens nos Container Apps
        run: |
          ACR="${{ needs.infra.outputs.acr-login-server }}"
          TAG="${{ github.sha }}"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          PREFIX="${{ env.APP_NAME }}-${{ env.DEPLOY_ENV }}"

          for app in backend mcp-zabbix mcp-datadog mcp-grafana mcp-thousandeyes; do
            echo "→ Atualizando $PREFIX-$app..."
            az containerapp update \
              --name "$PREFIX-$app" \
              --resource-group "$RG" \
              --image "$ACR/$app:$TAG" \
              --output none
          done

      - name: Aguardar backend saudável
        run: |
          echo "Aguardando backend responder em /health..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ needs.infra.outputs.backend-fqdn }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend online (tentativa $i)."
              exit 0
            fi
            echo "  Tentativa $i: status $STATUS — aguardando 15s..."
            sleep 15
          done
          echo "❌ Backend não respondeu após 5 minutos."
          exit 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Build e deploy do frontend (Static Web Apps)
# Aguarda o backend estar online para usar o FQDN correto.
# ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend (SWA)
    runs-on: ubuntu-latest
    needs: [infra, deploy-apps]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          # VITE_BACKEND_URL é substituído em build time (não runtime)
          VITE_BACKEND_URL: https://${{ needs.infra.outputs.backend-fqdn }}
        run: npm run build

      - name: Login Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Obter token do Static Web App
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ needs.infra.outputs.swa-name }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy no Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend
          output_location: dist
          skip_app_build: true   # já buildamos acima

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Smoke test pós-deploy
# ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: 🔬 Smoke Test
    runs-on: ubuntu-latest
    needs: [infra, deploy-apps, deploy-frontend]
    if: always() && needs.deploy-apps.result == 'success'

    steps:
      - name: Testar endpoints críticos
        run: |
          BACKEND="https://${{ needs.infra.outputs.backend-fqdn }}"

          check() {
            local url="$1"
            local expected="$2"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$STATUS" = "$expected" ]; then
              echo "  ✅ $url → $STATUS"
            else
              echo "  ❌ $url → $STATUS (esperado $expected)"
              exit 1
            fi
          }

          echo "── Backend ─────────────────────────────"
          check "$BACKEND/health"          "200"
          check "$BACKEND/auth/login"      "405"   # POST only — GET retorna 405
          check "$BACKEND/admin/status"    "403"   # sem token → 403

          echo "── Frontend ─────────────────────────────"
          check "https://${{ needs.infra.outputs.frontend-hostname }}" "200"

          echo ""
          echo "✅ Todos os checks passaram."
