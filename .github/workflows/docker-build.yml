name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: noc-ai-chat/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: noc-ai-chat/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MCP server images
        run: |
          for svc in zabbix datadog grafana thousandeyes; do
            echo "Building mcp-$svc..."
            docker build -t noc-ai-chat/mcp-$svc:latest mcp-servers/$svc/
          done

      - name: Report image sizes
        run: docker images noc-ai-chat/* --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
