name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short --junit-xml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  mcp-test:
    name: MCP Servers Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install fastapi uvicorn httpx pydantic pydantic-settings \
                      pytest pytest-asyncio anyio
          cd backend && pip install -r requirements.txt

      - name: Run MCP tests
        working-directory: backend
        run: pytest tests/test_mcp_servers.py -v --tb=short

  frontend-check:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check all Dockerfiles exist
        run: |
          test -f frontend/Dockerfile && echo "✅ frontend"
          test -f backend/Dockerfile && echo "✅ backend"
          for svc in zabbix datadog grafana thousandeyes; do
            test -f mcp-servers/$svc/Dockerfile && echo "✅ mcp-$svc"
          done
