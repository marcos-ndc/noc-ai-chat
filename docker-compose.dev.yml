version: '3.9'

# ─── Desenvolvimento local com hot-reload ─────────────────────────────────────
# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Ou:  make dev
#
# Portas padrão (configuráveis no .env):
#   FRONTEND_PORT=3000
#   BACKEND_PORT=8000
#   REDIS_PORT=6379

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    pull_policy: if_not_present
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_BACKEND_URL=http://localhost:${BACKEND_PORT:-8000}
    command: npm run dev -- --host 0.0.0.0 --port 3000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    pull_policy: if_not_present
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy

  mcp-zabbix:
    build:
      context: ./mcp-servers/zabbix
    pull_policy: if_not_present
    volumes:
      - ./mcp-servers/zabbix/server.py:/app/server.py
    env_file: .env
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  mcp-datadog:
    build:
      context: ./mcp-servers/datadog
    pull_policy: if_not_present
    volumes:
      - ./mcp-servers/datadog/server.py:/app/server.py
    env_file: .env
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  mcp-grafana:
    build:
      context: ./mcp-servers/grafana
    pull_policy: if_not_present
    volumes:
      - ./mcp-servers/grafana/server.py:/app/server.py
    env_file: .env
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  mcp-thousandeyes:
    build:
      context: ./mcp-servers/thousandeyes
    pull_policy: if_not_present
    volumes:
      - ./mcp-servers/thousandeyes/server.py:/app/server.py
    env_file: .env
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_dev_data:
