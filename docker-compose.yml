version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      mcp-zabbix:
        condition: service_started
      mcp-datadog:
        condition: service_started
      mcp-grafana:
        condition: service_started
      mcp-thousandeyes:
        condition: service_started
    environment:
      - MCP_ZABBIX_URL=http://mcp-zabbix:8001
      - MCP_DATADOG_URL=http://mcp-datadog:8002
      - MCP_GRAFANA_URL=http://mcp-grafana:8003
      - MCP_THOUSANDEYES_URL=http://mcp-thousandeyes:8004

  mcp-zabbix:
    build:
      context: ./mcp-servers/zabbix
    ports: ["8001:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-datadog:
    build:
      context: ./mcp-servers/datadog
    ports: ["8002:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-grafana:
    build:
      context: ./mcp-servers/grafana
    ports: ["8003:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-thousandeyes:
    build:
      context: ./mcp-servers/thousandeyes
    ports: ["8004:8001"]
    env_file: .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
