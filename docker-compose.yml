services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
    pull_policy: if_not_present
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    pull_policy: if_not_present
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      mcp-zabbix:
        condition: service_started
      mcp-datadog:
        condition: service_started
      mcp-grafana:
        condition: service_started
      mcp-thousandeyes:
        condition: service_started
      mcp-catalyst-center:
        condition: service_started
    environment:
      # Todos os MCP servers escutam na porta 8001 internamente (rede Docker)
      - MCP_ZABBIX_URL=http://mcp-zabbix:8001
      - MCP_DATADOG_URL=http://mcp-datadog:8001
      - MCP_GRAFANA_URL=http://mcp-grafana:8001
      - MCP_THOUSANDEYES_URL=http://mcp-thousandeyes:8001
      - MCP_CATALYST_CENTER_URL=http://mcp-catalyst-center:8001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TTS_VOICE=${TTS_VOICE:-onyx}
      - TTS_MODEL=${TTS_MODEL:-tts-1-hd}
      - TTS_SPEED=${TTS_SPEED:-0.92}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_MODEL=${ELEVENLABS_MODEL:-eleven_flash_v2_5}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}

  mcp-zabbix:
    build:
      context: ./mcp-servers/zabbix
    ports: ["8001:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-datadog:
    build:
      context: ./mcp-servers/datadog
    ports: ["8002:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-grafana:
    build:
      context: ./mcp-servers/grafana
    ports: ["8003:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-thousandeyes:
    build:
      context: ./mcp-servers/thousandeyes
    ports: ["8004:8001"]
    env_file: .env
    restart: unless-stopped

  mcp-catalyst-center:
    build:
      context: ./mcp-servers/catalyst-center
    ports: ["8005:8001"]
    env_file: .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
